name: live-model-benchmark

# H4 external-evidence lane. A missing credential is UNVERIFIED (exit 3) and
# fails the job after uploading the diagnostic report; it can never look PASS.
"on":
  schedule:
    - cron: "17 4 * * 1"
  push:
    branches: ["release/*"]
  workflow_dispatch:
    inputs:
      model:
        description: "Claude model alias"
        required: false
        default: "sonnet"
      budget:
        description: "Maximum USD for the representative fixture"
        required: false
        default: "5.00"

permissions:
  contents: read

jobs:
  benchmark:
    name: H4 — live candidate + independent snapshot oracle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.com/claude-code/install.sh | bash
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"

      - name: Run representative live-model benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 tests/run-live-model-benchmark.py \
            --fixture fixture-03-cli-tool \
            --provider anthropic \
            --model "${{ inputs.model || 'sonnet' }}" \
            --budget "${{ inputs.budget || '5.00' }}" \
            --evidence tests/fixtures/live-model-evidence/latest.json

      - name: Replay and verify independent evidence
        run: |
          python3 tests/verify_live_model_benchmark.py \
            --require-evidence --max-age-days 30

      - name: Upload PASS, FAIL, or UNVERIFIED evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-model-evidence-${{ github.run_id }}
          path: tests/fixtures/live-model-evidence/
          retention-days: 35
