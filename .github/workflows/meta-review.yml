name: meta-review

# Server-side Gate 1. Runs on every push to main and every PR against it.
# Executes the same rubric that local enforcement hooks run pre-commit —
# this is the defense-in-depth layer that catches anything the local hooks
# missed (or were never installed to catch in the first place).
#
# Added in v1.8.0 per CHANGELOG reasoning: 3 GitHub stars within 24h of
# publishing the repo flipped the cost/benefit on CI from "wait for first
# PR" to "have it in place BEFORE the first PR arrives".
#
# The workflow uses only Python 3.11 stdlib — no pip install step — because
# tests/meta_review.py and tests/verify_triggers.py are intentionally
# zero-dependency. This keeps the run fast (< 30 seconds typically) and
# removes supply-chain risk from the CI itself.
#
# To enable as a required check on main, see docs/CI.md for the GitHub UI
# steps (branch protection must be configured manually — it cannot be
# provisioned from code).

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  meta-review:
    name: Gate 1 — meta-review rubric
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run meta-review rubric (verbose)
        run: python3 tests/meta_review.py --verbose

      - name: Run trigger drift verifier (standalone check)
        run: python3 tests/verify_triggers.py

      - name: Run DoD pre-commit gate unit tests (v1.23.0)
        run: python3 tests/verify_dod_gate.py

      - name: Run skill-enforcement gate unit tests (v1.24.0)
        run: python3 tests/verify_skill_enforcement.py

      - name: Run subagent-review sentinel tests (v1.25.0)
        run: python3 tests/verify_agent_review_sentinel.py

      - name: Run caller-side auto-ping-for-verdict doc-contract (v1.60.0, Ось 2)
        run: python3 tests/verify_review_autoping.py

      - name: Run refute-pass fleet doc-contract (v1.60.0, Ось 2)
        run: python3 tests/verify_refute_fleet.py

      - name: Run risk-tier => model monotonicity invariant (v1.60.0, Ось 2)
        run: python3 tests/verify_model_risk_monotonic.py

      - name: Run skill DoD machine-readable coverage (v1.60.0, Ось 2)
        run: python3 tests/verify_dod_coverage.py

      - name: Run stall-resilience fresh-narrow-agent fallback doc-contract (v1.60.0, Ось 2)
        run: python3 tests/verify_stall_fallback.py

      - name: Run declared-source read doc-contract (v1.77.0)
        run: python3 tests/verify_source_read_contract.py

      - name: Run harness-native feature ledger structural gate (v1.61.0, Ось 3)
        run: python3 tests/verify_feature_ledger.py

      - name: Run feature-ledger completeness drift-guard (v1.61.0, Ось 3)
        run: python3 tests/verify_feature_ledger_completeness.py

      - name: Run feature-ledger fallback fixture-proof (v1.61.0, Ось 3)
        run: python3 tests/verify_feature_ledger_fallbacks.py

      - name: Run /retro abstention re-review gate (v1.61.0, Ось 3)
        run: python3 tests/verify_retro_abstention_review.py

      - name: Run feature-ledger targeted-adoptions gate (v1.61.0, Ось 3)
        run: python3 tests/verify_feature_ledger_adoptions.py

      - name: Run init-hardening contracts gate (v1.67.0, init-audit P1-P5)
        run: python3 tests/verify_init_contracts.py

      - name: Run session hygiene, quality ledger, and ablation behavioural proof
        run: python3 tests/verify_session_hygiene_quality.py

      - name: Run cost-tracker ledger isolation + context sensor gate (v1.71.0, retro 2026-07-09)
        run: python3 tests/verify_cost_tracker.py

      - name: Verify observed token provenance and estimate separation
        run: python3 tests/verify_observed_token_telemetry.py

      - name: Measure control coverage and false classifications
        run: python3 tests/verify_control_quality.py

      - name: Fail closed on Harness documentation/version drift
        run: python3 tests/verify_harness_docs_freshness.py

      - name: Validate the frozen practical-effectiveness audit oracle
        run: python3 tests/verify_practical_effectiveness.py --axis contract

      - name: Prove cold-start adoption and operational-friction contracts
        run: |
          python3 tests/verify_operational_cold_start.py
          python3 tests/verify_operational_continuation.py
          python3 tests/verify_bypass_friction.py

      - name: Prove the evidence-backed human-gated learning loop
        run: python3 tests/verify_learning_loop.py

      - name: Prove cross-platform runtime and adapter launch parity
        run: python3 tests/verify_cross_platform_runtime.py

      - name: Prove the privacy-safe external outcome contract
        run: python3 tests/verify_external_outcome_contract.py

      - name: Run review report-file + finish-line interruption doc-contract (v1.72.0)
        run: python3 tests/verify_review_report_file.py

      - name: Run ACID state-hardening (atomic writes, ledger lock, errors.log, state-guard, reconciliation) (v1.75.0)
        run: python3 tests/verify_state_hardening.py

      - name: Run hook-table completeness G-005 (map quadrants/blocking rows vs hooks/) (v1.76.0 — был латентным, протух на v1.75.0)
        run: python3 tests/verify_hook_table_completeness.py

      - name: Run gate taxonomy (10 hard / 18 soft) (v1.79.1 — были local-only, найдено дрифт-гардом)
        run: python3 tests/verify_gate_taxonomy.py

      - name: Run G-003 fixture-proof grid (hard-gate coverage 10/10) (v1.79.1)
        run: python3 tests/verify_harness_map_fixtures.py

      - name: Replay fresh live-model evidence against the independent oracle
        run: python3 tests/verify_live_model_benchmark.py --require-evidence --max-age-days 30

      - name: Run completion-gate behavioural proof (v1.79.1)
        run: python3 tests/verify_completion_gate.py

      - name: Run completion-ledger checks (v1.79.1)
        run: python3 tests/verify_completion_ledger.py

      - name: Run no-bare-python3 gate (skills snippets via itd_py.sh launcher) (v1.83.0)
        run: python3 tests/verify_no_bare_python3.py

      - name: Run model-policy hint behavioural test (risk-tier => model at spawn) (v1.83.0)
        run: python3 tests/verify_model_policy_hint.py

      - name: Run working-deadline model/effort documentation oracle (PE5-015)
        run: python3 tests/verify_work_deadline_docs.py

      - name: Run frozen working-deadline A/B and no-regression benchmark (PE5-016)
        run: python3 tests/verify_work_deadline_benchmark.py

      - name: Run py-launcher encoding contract (PYTHONIOENCODING/PYTHONUTF8 in itd_py.sh) (v1.85.0)
        run: python3 tests/verify_py_launcher_encoding.py

      - name: Run unit-log harness writer contract (paired activated/verified, fail-closed) (v1.85.0)
        run: python3 tests/verify_unit_log.py

      - name: Run goal-verify POSIX shell contract (no cmd.exe false-pass) (v1.87.0)
        run: python3 tests/verify_goal_verify_shell.py

      - name: Run bounded goal autonomy contract (sealed oracle, budgets, attempts)
        run: python3 tests/verify_goal_bounded_autonomy.py

      - name: Run bounded goal deterministic five-star evaluator
        run: python3 tests/verify_goal_five_star.py

      - name: Run project-checks slot contract (.itd/checks runner + DoD wiring) (v1.87.0)
        run: python3 tests/verify_project_checks.py

      - name: Run external-review importer contract (findings ledger, dedup, classify) (v1.87.0)
        run: python3 tests/verify_review_import.py

      - name: Run run-all.sh vs workflows drift-guard (v1.79.1)
        run: python3 tests/verify_runall_drift.py

      - name: Verify sync-to-active hook registration (drift guard, v1.20.1+)
        run: bash scripts/verify-sync-to-active.sh
