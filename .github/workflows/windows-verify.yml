name: windows-verify

# v1.42.0 — the Windows leg of CI. The methodology runs on two platforms in
# production (WSL + a native-Windows Claude Code install), but until now every
# verify suite ran only on Linux — which is exactly how the "/tmp on Windows"
# sentinel-exchange bug class (dead review-gate/cost/risk/stuck/crash on the
# Windows machine, fixed in v1.42.0) shipped unnoticed. This job runs the
# platform-sensitive suites on windows-latest so that class cannot regress.
#
# Zero-dependency by design (stdlib only), same as meta-review.yml.

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-verify:
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      # The runner console is cp1252; meta_review prints emoji markers.
      # Real Windows installs invoke hooks with `python -X utf8` — mirror that.
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Platform tmp symmetry + new-hook functional tests
        run: python tests/verify_platform_tmp_and_new_hooks.py
      - name: Goal harness tools (verifier + reporter) functional tests
        run: python tests/verify_goal_tools.py
      - name: Retro telemetry scanner functional tests
        run: python tests/verify_retro_scan.py
      - name: Retro-fix pack v1.47.0 functional tests
        run: python tests/verify_v147_fixes.py
      - name: Hook semantic-depth tests (9 previously smoke-only hooks)
        run: python tests/verify_hook_depth.py
      - name: Narration-final detector functional tests (SubagentStop)
        run: python tests/verify_narration_final.py
      - name: Verdict-contract validator functional tests (SubagentStop, v1.51.0)
        run: python tests/verify_verdict_contract.py
      - name: Worktree hook-safety audit invariant (v1.52.0)
        run: python tests/verify_worktree_hook_safety.py
      - name: M-C15 spelled hook-count parser (retro P2, v1.53.0)
        run: python tests/verify_hook_count_words.py
      - name: Fable 5 release-A snippet pack (v1.50.0)
        run: python tests/verify_fable_snippets.py
      - name: Fable 5 feature ledger — structural gate (v1.61.0, Ось 3)
        run: python tests/verify_feature_ledger.py
      - name: Fable 5 feature ledger — completeness drift-guard (v1.61.0, Ось 3)
        run: python tests/verify_feature_ledger_completeness.py
      - name: Fable 5 feature ledger — fallback fixture-proof (v1.61.0, Ось 3)
        run: python tests/verify_feature_ledger_fallbacks.py
      - name: /retro abstention re-review gate (v1.61.0, Ось 3)
        run: python tests/verify_retro_abstention_review.py
      - name: Fable 5 feature ledger — adoptions gate (v1.61.0, Ось 3)
        run: python tests/verify_feature_ledger_adoptions.py
      - name: Fixture contracts — all fixtures by status (Phase-2)
        run: python tests/verify_snapshot.py --all
      - name: Registration & count drift-guards
        run: python tests/verify_registration_and_counts.py
      - name: Skill contract profiles
        run: python scripts/verify_skill_profiles.py
      - name: Routing-accuracy benchmark + exclusivity eval (v1.57.0, D2)
        run: python tests/verify_routing.py
      - name: Meta-review rubric
        run: python tests/meta_review.py
      - name: Init-hardening contracts gate on legacy encoding (v1.68.1)
        # PYTHONUTF8=0 deliberately: the non-ASCII-path regression only
        # manifests when subprocess text-mode falls back to the locale
        # codepage - the exact Windows environment the job-level UTF8 masks.
        env:
          PYTHONUTF8: "0"
        run: python tests/verify_init_contracts.py
      - name: Cost-tracker ledger isolation + context sensor gate (v1.71.0)
        run: python tests/verify_cost_tracker.py
      - name: Review report-file + finish-line interruption doc-contract (v1.72.0)
        run: python tests/verify_review_report_file.py
      - name: Cost-tracker gate on legacy encoding (v1.71.0)
        # Same rationale as the v1.68.1 step above: the Cyrillic context-hint
        # emit crashes only under the locale codepage (review finding C1).
        env:
          PYTHONUTF8: "0"
        run: python tests/verify_cost_tracker.py
